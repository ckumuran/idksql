<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>IDKSQL</title>

    <style>

        body {

            background:
                #050505;

            color:
                white;

            font-family:
                monospace;

            padding:
                20px;

            margin:
                0;
        }

        h1 {

            color:
                #ff3b3b;

            letter-spacing:
                4px;
        }

        .section {

            margin-top:
                30px;
        }

        .section-title {

            color:
                #888;

            font-size:
                12px;

            letter-spacing:
                2px;

            margin-bottom:
                20px;
        }

        .db-title {

            color:
                #ff4d4d;

            margin-bottom:
                8px;
        }

        .tables {

            padding-left:
                15px;

            color:
                #aaa;

            line-height:
                1.8;
        }

        .status {

            width:
                10px;

            height:
                10px;

            border-radius:
                50%;

            background:
                #00ff66;

            display:
                inline-block;

            margin-right:
                10px;
        }

    </style>

</head>

<body>

    <h1>IDKSQL</h1>

    <div class="section">

        <div class="section-title">

            DATABASES

        </div>

        <div>

            <div class="db-title">

                <span class="status"></span>

                MYSQL

            </div>

            <div class="tables">

                users<br>
                orders<br>
                payments

            </div>

        </div>

        <br>

        <div>

            <div class="db-title">

                <span class="status"></span>

                POSTGRES

            </div>

            <div class="tables">

                employees<br>
                payroll

            </div>

        </div>

    </div>

</body>

</html>
